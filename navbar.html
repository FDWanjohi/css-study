<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavigationBar</title>
    <style>
        .navbar {
            background-color: skyblue;
            height: 100px;
            border-radius: 10px;
            border: 1px black solid;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: larger;
        }

        .navbar a{
            color: white;
            text-decoration: none;
            margin: 0 20px 0 0;

        }

        .navbar .list{
            text-decoration: none; 
            color: white;
            list-style: none;
            display: flex;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <a href="">NavBar</a>
        <ul class="list">
            <li><a href="">Home</a></li>
            <li><a href="">Features</a></li>
            <li><a href="">Services</a></li>
            <li><a href="">Our Work</a></li>
        </ul>
    </div>
</body>

</html>
