<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            border: 2px double;
            border-radius: 20px;
            background-color: grey;
            display: flex;
            justify-content: space-evenly;
        }

        .box1 {
            border-radius: 2px;
            border: 2px double white;
            background-color: red;
            height: 200px;
            width: 200px;
        }

        .box2 {
            border-radius: 2px;
            border: 2px double white;
            background-color: orange;
            height: 200px;
            width: 200px;
        }

        .box3 {
            border-radius: 2px;
            border: 2px double white;
            background-color: yellow;
            height: 200px;
            width: 200px;
        }

        .box4 {
            border-radius: 2px;
            border: 2px double white;
            background-color: green;
            height: 200px;
            width: 200px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box1">
            <h1>box1</h1>

        </div>
        <div class="box2">
            <h1>box2</h1>

        </div>
        <div class="box3">
            <h1>box3</h1>
        </div>
        <div class="box4">
            <h1>box4</h1>
        </div>

    </div>
</body>

</html>
